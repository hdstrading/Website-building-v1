<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDS Trading Payroll Solutions — Employee Portal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%2317408b'/><rect x='17' y='47' width='30' height='5' rx='2.5' fill='%23e11d2a'/><text x='32' y='42' font-family='Arial' font-size='36' font-weight='bold' fill='%23fff' text-anchor='middle'>₱</text></svg>">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f1f5f9; color: #1e293b; }
    header { background: #0b2447; color: #fff; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    header .who { font-size: 14px; }
    header .who b { display: block; font-size: 16px; }
    .logout { background: rgba(255,255,255,.12); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .hdr-right { display: flex; align-items: center; gap: 10px; }
    .bell { position: relative; background: rgba(255,255,255,.12); color: #fff; border: none; width: 38px; height: 38px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .bell-badge { position: absolute; top: -5px; right: -5px; background: #e11d2a; color: #fff; font-size: 10px; font-weight: 700; min-width: 17px; height: 17px; border-radius: 9px; padding: 0 4px; display: flex; align-items: center; justify-content: center; }
    .npanel { position: fixed; right: 14px; top: 60px; width: 340px; max-width: calc(100vw - 28px); background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,.22); z-index: 50; overflow: hidden; display: none; }
    .npanel.open { display: block; }
    .npanel h3 { margin: 0; font-size: 14px; padding: 12px 14px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .npanel h3 a { text-decoration: none; }
    .nitem { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; }
    .nitem.unread { background: #eff6ff; }
    .nitem b { font-size: 13px; display: block; }
    .nitem p { margin: 2px 0 0; font-size: 12px; color: #475569; }
    .nitem .nt { font-size: 10px; color: #94a3b8; margin-top: 2px; }
    .ntoast { position: fixed; right: 16px; bottom: 16px; background: #0b2447; color: #fff; padding: 12px 16px; border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,.3); font-size: 13px; max-width: 300px; z-index: 100; animation: nfade .3s ease; }
    @keyframes nfade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    nav.tabs { display: flex; gap: 4px; background: #0e2138; padding: 0 10px; overflow-x: auto; }
    nav.tabs a { color: #cbd5e1; padding: 12px 16px; text-decoration: none; font-weight: 600; font-size: 14px; white-space: nowrap; }
    nav.tabs a.active { color: #fff; box-shadow: inset 0 -3px 0 #e11d2a; }
    main { max-width: 900px; margin: 0 auto; padding: 18px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.05); margin-bottom: 16px; }
    .card h2 { margin: 0; font-size: 16px; padding: 14px 16px; border-bottom: 1px solid #e2e8f0; }
    .card .in { padding: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    th { background: #f8fafc; color: #64748b; font-size: 12px; }
    .num { text-align: right; }
    input, select, textarea { padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 13px; font-family: inherit; }
    label { font-size: 12px; color: #64748b; font-weight: 600; display: block; margin-bottom: 4px; }
    .btn { background: #17408b; color: #fff; border: none; padding: 9px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; }
    .btn.sm { padding: 5px 10px; font-size: 12px; }
    .btn.ghost { background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
    .kv td:first-child { color: #64748b; width: 42%; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge.pending { background: #fef3c7; color: #b45309; }
    .badge.approved { background: #dcfce7; color: #15803d; }
    .badge.rejected { background: #fee2e2; color: #b91c1c; }
    .muted { color: #94a3b8; }
    .msg { font-size: 13px; margin-top: 10px; }
    .msg.ok { color: #15803d; } .msg.err { color: #b91c1c; }
    .scroll { overflow-x: auto; }
    /* Leave calendar */
    .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-head b { font-size: 15px; }
    .cal-nav { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 7px; padding: 4px 12px; cursor: pointer; font-size: 16px; font-weight: 700; }
    .cal-nav:disabled { opacity: .4; cursor: not-allowed; }
    .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal .dow { text-align: center; font-size: 11px; color: #94a3b8; font-weight: 700; padding: 4px 0; }
    .cal .cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 13px; border: 1px solid transparent; }
    .cal .cell.day { background: #f8fafc; border-color: #e2e8f0; cursor: pointer; }
    .cal .cell.day:hover { border-color: #2563eb; }
    .cal .cell.disabled { color: #cbd5e1; background: #fff; cursor: not-allowed; }
    .cal .cell.sel { background: #17408b; color: #fff; border-color: #17408b; font-weight: 700; }
    .cal .cell.today { box-shadow: inset 0 0 0 2px #f59e0b; }
    .cal .cell.empty { background: transparent; }
    .legend { font-size: 12px; color: #64748b; margin: 8px 0; }
    @media(max-width:640px){
      .grid2 { grid-template-columns: 1fr; }
      header { padding: 12px 14px; }
      header .who b { font-size: 15px; }
      main { padding: 12px; }
      .card .in { padding: 12px; }
      .npanel { top: 56px; right: 8px; }
      .cal .cell { font-size: 12px; }
      table { font-size: 12px; }
      th, td { padding: 6px 7px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="who"><b id="whoName">—</b><span id="whoMeta" class="muted"></span></div>
    <div class="hdr-right">
      <button class="bell" id="bell" aria-label="Notifications" title="Notifications">🔔<span class="bell-badge" id="bellBadge" hidden>0</span></button>
      <button class="logout" id="logout">Log out</button>
    </div>
  </header>
  <div class="npanel" id="npanel">
    <h3>Notifications <a href="#" id="nMarkAll" style="font-size:12px;color:#17408b">Mark all read</a></h3>
    <div id="nList" style="max-height:60vh;overflow:auto"></div>
  </div>
  <nav class="tabs">
    <a href="#" class="active" data-tab="profile">My 201</a>
    <a href="#" data-tab="dtr">My DTR</a>
    <a href="#" data-tab="leave">File Leave</a>
    <a href="#" data-tab="overtime">Overtime</a>
    <a href="#" data-tab="loans">Loans</a>
    <a href="#" data-tab="payslips">My Payslips</a>
  </nav>
  <main id="view"></main>

  <script>
    var peso = function (n) { return '₱' + (Number(n) || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };
    var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); };
    var state = { profile: null };

    function api(url, opts) {
      return fetch(url, Object.assign({ headers: { 'Content-Type': 'application/json' } }, opts || {}))
        .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, status: r.status, body: j }; }); });
    }
    document.getElementById('logout').addEventListener('click', function () {
      api('/api/auth/logout', { method: 'POST' }).then(function () { location.href = '/'; });
    });

    // ---- Notifications ----
    var notif = { unread: 0, items: [], started: false };
    function timeAgo(s) {
      var d = new Date((s || '').replace(' ', 'T') + 'Z'), diff = (Date.now() - d.getTime()) / 1000;
      if (isNaN(diff)) return '';
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }
    var NICON = { payslip: '💵', leave: '🌴', loan: '💳', overtime: '⏱️' };
    function renderNotifPanel() {
      var el = document.getElementById('nList');
      el.innerHTML = notif.items.length ? notif.items.map(function (n) {
        return '<div class="nitem ' + (n.is_read ? '' : 'unread') + '"><b>' + (NICON[n.type] || '🔔') + ' ' + esc(n.title) + '</b>' +
          '<p>' + esc(n.body) + '</p><div class="nt">' + timeAgo(n.created_at) + '</div></div>';
      }).join('') : '<p class="muted" style="padding:14px">No notifications yet.</p>';
    }
    function setBadge(n) {
      var b = document.getElementById('bellBadge');
      if (n > 0) { b.textContent = n > 99 ? '99+' : n; b.hidden = false; } else { b.hidden = true; }
    }
    function toast(text) {
      var t = document.createElement('div'); t.className = 'ntoast'; t.textContent = text;
      document.body.appendChild(t); setTimeout(function () { t.remove(); }, 5000);
    }
    function pollNotifs() {
      api('/api/me/notifications').then(function (r) {
        if (!r.ok) return;
        var prev = notif.unread;
        notif.items = r.body.items || []; notif.unread = r.body.unread || 0;
        setBadge(notif.unread);
        if (notif.started && notif.unread > prev && notif.items[0]) toast(notif.items[0].title + ' — ' + notif.items[0].body);
        notif.started = true;
        if (document.getElementById('npanel').classList.contains('open')) renderNotifPanel();
      });
    }
    document.getElementById('bell').addEventListener('click', function (e) {
      e.stopPropagation();
      var p = document.getElementById('npanel');
      var opening = !p.classList.contains('open');
      p.classList.toggle('open', opening);
      if (opening) {
        renderNotifPanel();
        if (notif.unread > 0) api('/api/me/notifications/read', { method: 'POST', body: '{}' }).then(function () { notif.unread = 0; setBadge(0); notif.items.forEach(function (n) { n.is_read = 1; }); });
      }
    });
    document.getElementById('nMarkAll').addEventListener('click', function (e) {
      e.preventDefault();
      api('/api/me/notifications/read', { method: 'POST', body: '{}' }).then(function () { notif.unread = 0; setBadge(0); notif.items.forEach(function (n) { n.is_read = 1; }); renderNotifPanel(); });
    });
    document.addEventListener('click', function (e) {
      var p = document.getElementById('npanel');
      if (p.classList.contains('open') && !p.contains(e.target) && e.target.id !== 'bell') p.classList.remove('open');
    });
    document.querySelectorAll('nav.tabs a').forEach(function (a) {
      a.addEventListener('click', function (e) { e.preventDefault(); go(a.dataset.tab); });
    });
    function go(tab) {
      document.querySelectorAll('nav.tabs a').forEach(function (a) { a.classList.toggle('active', a.dataset.tab === tab); });
      ({ profile: viewProfile, dtr: viewDTR, leave: viewLeave, overtime: viewOvertime, loans: viewLoans, payslips: viewPayslips })[tab]();
    }

    // ---- bootstrap ----
    api('/api/auth/me').then(function (me) {
      if (!me.body.user) { location.href = '/'; return; }
      if (me.body.user.role !== 'employee') { location.href = '/app'; return; }
      return api('/api/me/profile').then(function (p) {
        state.profile = p.body;
        document.getElementById('whoName').textContent = p.body.user.fullName || p.body.user.email;
        var emp = p.body.employee;
        document.getElementById('whoMeta').textContent = emp ? (emp.position || '') + (emp.code ? ' • ' + emp.code : '') : 'Awaiting 201 link';
        go('profile');
        pollNotifs();
        setInterval(pollNotifs, 45000);
      });
    });

    // ---- My 201 ----
    function viewProfile() {
      var emp = state.profile.employee;
      var src = emp || state.profile.profile || {};
      function row(l, v) { return '<tr class="kv"><td>' + l + '</td><td>' + esc(v || '—') + '</td></tr>'; }
      var body = !emp
        ? '<p class="muted">Your account is not yet linked to an employee record. Some details you entered at sign-up are shown below; an administrator will finalize your 201 file.</p>'
        : '';
      document.getElementById('view').innerHTML =
        '<div class="card"><h2>My 201 File</h2><div class="in">' + body +
        '<div class="grid2"><table>' +
        row('Name', ((src.lastName || '') + ', ' + (src.firstName || '') + ' ' + (src.middleName || '')).trim()) +
        row('Position', src.position) + row('Department', src.department) +
        row('Date Hired', src.hireDate) + row('Employment Status', src.employmentStatus) +
        row('Contact', src.contactNumber) + row('Address', src.address) +
        '</table><table>' +
        row('SSS No.', src.sssNo) + row('PhilHealth No.', src.philhealthNo) +
        row('Pag-IBIG No.', src.pagibigNo) + row('TIN', src.tin) +
        row('Bank', src.bankName) + row('Account Name', src.bankAccountName) + row('Account No.', src.bankAccountNumber) +
        '</table></div></div></div>';
    }

    // ---- My DTR ----
    function pad2(n) { return (n < 10 ? '0' : '') + n; }
    function coverageDays(period, restDow) {
      var out = []; var s = new Date(period.startDate + 'T00:00:00'), e = new Date(period.endDate + 'T00:00:00');
      if (isNaN(s) || isNaN(e)) return out;
      var g = 0;
      for (var d = new Date(s); d <= e && g < 400; d.setDate(d.getDate() + 1), g++) {
        out.push({ date: d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()), restDay: d.getDay() === restDow });
      }
      return out;
    }
    function viewDTR() {
      api('/api/me/periods').then(function (r) {
        var periods = r.body.periods.filter(function (p) { return p.status !== 'finalized'; });
        var opts = periods.map(function (p) { return '<option value="' + p.id + '">' + esc(p.name) + '</option>'; }).join('');
        document.getElementById('view').innerHTML =
          '<div class="card"><h2>My Daily Time Record</h2><div class="in">' +
          (periods.length ? '<label>Payroll period</label><select id="perSel" style="max-width:320px">' + opts + '</select>' +
            '<div id="dtrArea" style="margin-top:14px"></div>'
            : '<p class="muted">No open payroll period to fill in yet.</p>') + '</div></div>';
        if (!periods.length) return;
        var sel = document.getElementById('perSel');
        sel.addEventListener('change', function () { loadDtr(sel.value, periods); });
        loadDtr(sel.value, periods);
      });
    }
    function loadDtr(pid, periods) {
      var period = periods.filter(function (p) { return p.id === pid; })[0];
      api('/api/me/dtr/' + pid).then(function (r) {
        var existing = r.body.days || [];
        var restDow = (state.profile.employee && state.profile.employee.restDay != null) ? parseInt(state.profile.employee.restDay, 10) : -1;
        var days = existing.length ? existing : coverageDays(period, restDow);
        var emp = state.profile.employee || {};
        var rows = days.map(function (d, i) {
          return '<tr><td>' + esc(d.date || '') + '</td>' +
            '<td><input name="in" value="' + esc(d.timeIn || '') + '" placeholder="' + esc(emp.schedTimeIn || '08:00') + '" style="width:90px"></td>' +
            '<td><input name="out" value="' + esc(d.timeOut || '') + '" placeholder="' + esc(emp.schedTimeOut || '17:00') + '" style="width:90px"></td>' +
            '<td style="text-align:center"><input name="rest" type="checkbox"' + (d.restDay ? ' checked' : '') + '></td>' +
            '<td style="text-align:center"><input name="absent" type="checkbox"' + (d.absent ? ' checked' : '') + '></td>' +
            '<td><select name="leave"><option value="">—</option>' +
            ['SL', 'VL', 'EL'].map(function (t) { return '<option' + (d.leaveType === t ? ' selected' : '') + '>' + t + '</option>'; }).join('') +
            '</select></td></tr>';
        }).join('');
        document.getElementById('dtrArea').innerHTML =
          '<div class="scroll"><table><thead><tr><th>Date</th><th>In</th><th>Out</th><th>Rest</th><th>Absent</th><th>Leave</th></tr></thead>' +
          '<tbody id="dtrRows">' + rows + '</tbody></table></div>' +
          '<button class="btn" id="dtrSave" style="margin-top:12px">Submit DTR</button><span id="dtrMsg" class="msg"></span>';
        document.getElementById('dtrSave').addEventListener('click', function () {
          var out = [];
          document.querySelectorAll('#dtrRows tr').forEach(function (tr, i) {
            var g = function (n) { return tr.querySelector('[name=' + n + ']'); };
            var lt = g('leave').value;
            out.push({ date: days[i].date, timeIn: g('in').value, timeOut: g('out').value,
              restDay: g('rest').checked, absent: g('absent').checked, leaveType: lt, leavePaid: !!lt, dayType: 'regular' });
          });
          api('/api/me/dtr/' + pid, { method: 'POST', body: JSON.stringify({ days: out }) }).then(function (res) {
            var m = document.getElementById('dtrMsg');
            m.textContent = res.ok ? '  ✓ Submitted' : ('  ' + (res.body.error || 'Failed'));
            m.className = 'msg ' + (res.ok ? 'ok' : 'err');
          });
        });
      });
    }

    // ---- File Leave (calendar) ----
    // Shared window rule — MUST mirror server/src/index.js leaveDateAllowed().
    function ymIndex(y, m) { return y * 12 + m; }
    function leaveAllowed(dateObj, type, win, todayObj) {
      var openDay = Number(win.openDay) || 21, manualOpen = !!win.manualOpen;
      var d0 = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
      if (type === 'VL' && d0 < todayObj) return false;               // no backdated vacation
      var md = ymIndex(d0.getFullYear(), d0.getMonth()) - ymIndex(todayObj.getFullYear(), todayObj.getMonth());
      if (md <= -1) return type === 'SL' || type === 'EL';            // backdated sick/emergency only
      if (md === 0) return true;                                       // current month
      if (md === 1) return manualOpen || todayObj.getDate() >= openDay;
      return manualOpen;                                               // 2+ months ahead
    }
    var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var leaveState = { month: null, sel: {}, win: { openDay: 21, manualOpen: false }, today: new Date() };

    function viewLeave() {
      document.getElementById('view').innerHTML =
        '<div class="card"><h2>File a Leave Request</h2><div class="in">' +
        '<label>Leave type</label><select id="lType" style="max-width:260px">' +
        '<option value="VL">Vacation Leave (VL)</option><option value="SL">Sick Leave (SL)</option><option value="EL">Emergency Leave (EL)</option></select>' +
        '<div id="calWrap" style="margin-top:14px"></div>' +
        '<div class="legend" id="calNote"></div>' +
        '<label style="margin-top:6px">Reason</label><textarea id="lReason" rows="2" style="width:100%"></textarea>' +
        '<div id="selSummary" class="legend"></div>' +
        '<button class="btn" id="lSubmit" style="margin-top:8px">Submit Request</button><span id="lMsg" class="msg"></span>' +
        '</div></div><div class="card"><h2>My Leave Requests</h2><div class="in scroll" id="lList">Loading…</div></div>';
      leaveState.sel = {};
      api('/api/me/leave-window').then(function (r) {
        if (r.ok && r.body) {
          leaveState.win = { openDay: r.body.openDay, manualOpen: r.body.manualOpen };
          if (r.body.serverDate) { var p = r.body.serverDate.split('-'); leaveState.today = new Date(+p[0], +p[1] - 1, +p[2]); }
        }
        var t = leaveState.today;
        leaveState.month = new Date(t.getFullYear(), t.getMonth(), 1);
        document.getElementById('lType').addEventListener('change', function () { leaveState.sel = {}; renderCal(); });
        renderCal();
      });
      document.getElementById('lSubmit').addEventListener('click', submitLeave);
      loadLeaveList();
    }

    function renderCal() {
      var m = leaveState.month, type = document.getElementById('lType').value;
      var win = leaveState.win, today = leaveState.today;
      var first = new Date(m.getFullYear(), m.getMonth(), 1);
      var daysIn = new Date(m.getFullYear(), m.getMonth() + 1, 0).getDate();
      // Disable going before the current month.
      var atMinMonth = (m.getFullYear() === today.getFullYear() && m.getMonth() === today.getMonth());
      var cells = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(function (d) { return '<div class="dow">' + d + '</div>'; });
      for (var i = 0; i < first.getDay(); i++) cells.push('<div class="cell empty"></div>');
      for (var day = 1; day <= daysIn; day++) {
        var dObj = new Date(m.getFullYear(), m.getMonth(), day);
        var iso = dObj.getFullYear() + '-' + pad2(dObj.getMonth() + 1) + '-' + pad2(dObj.getDate());
        var ok = leaveAllowed(dObj, type, win, today);
        var isToday = (dObj.getTime() === today.getTime());
        var cls = 'cell ' + (ok ? 'day' : 'disabled') + (leaveState.sel[iso] ? ' sel' : '') + (isToday ? ' today' : '');
        cells.push('<div class="' + cls + '"' + (ok ? ' data-iso="' + iso + '"' : '') + '>' + day + '</div>');
      }
      document.getElementById('calWrap').innerHTML =
        '<div class="cal-head"><button class="cal-nav" id="calPrev"' + (atMinMonth ? ' disabled' : '') + '>‹</button>' +
        '<b>' + MONTHS[m.getMonth()] + ' ' + m.getFullYear() + '</b>' +
        '<button class="cal-nav" id="calNext">›</button></div>' +
        '<div class="cal">' + cells.join('') + '</div>';
      var openInfo = win.manualOpen ? 'Filing is currently open for future months.'
        : 'Next-month leave opens on day ' + (win.openDay || 21) + ' of the current month. Sick/Emergency leave can be filed anytime.';
      document.getElementById('calNote').textContent = openInfo;
      var prev = document.getElementById('calPrev'), next = document.getElementById('calNext');
      if (prev) prev.onclick = function () { leaveState.month = new Date(m.getFullYear(), m.getMonth() - 1, 1); renderCal(); };
      next.onclick = function () { leaveState.month = new Date(m.getFullYear(), m.getMonth() + 1, 1); renderCal(); };
      document.querySelectorAll('#calWrap .cell.day').forEach(function (c) {
        c.onclick = function () { var iso = c.dataset.iso; if (leaveState.sel[iso]) delete leaveState.sel[iso]; else leaveState.sel[iso] = true; renderCal(); updateSel(); };
      });
      updateSel();
    }
    function selectedDates() { return Object.keys(leaveState.sel).sort(); }
    function updateSel() {
      var d = selectedDates();
      document.getElementById('selSummary').textContent = d.length ? ('Selected: ' + d.length + ' day' + (d.length > 1 ? 's' : '') + ' (' + d[0] + (d.length > 1 ? ' … ' + d[d.length - 1] : '') + ')') : 'Tap the days you want off.';
    }
    // Group selected ISO dates into contiguous ranges.
    function contiguousRanges(dates) {
      var ranges = [], start = null, prev = null;
      dates.forEach(function (iso) {
        var d = new Date(iso + 'T00:00:00');
        if (start === null) { start = iso; prev = d; return; }
        var gap = (d - prev) / 86400000;
        if (gap === 1) { prev = d; return; }
        ranges.push([start, prev.getFullYear() + '-' + pad2(prev.getMonth() + 1) + '-' + pad2(prev.getDate())]);
        start = iso; prev = d;
      });
      if (start !== null) ranges.push([start, prev.getFullYear() + '-' + pad2(prev.getMonth() + 1) + '-' + pad2(prev.getDate())]);
      return ranges;
    }
    function submitLeave() {
      var m = document.getElementById('lMsg'), type = document.getElementById('lType').value;
      var reason = document.getElementById('lReason').value;
      var dates = selectedDates();
      if (!dates.length) { m.textContent = '  Pick at least one day.'; m.className = 'msg err'; return; }
      var ranges = contiguousRanges(dates);
      var btn = document.getElementById('lSubmit'); btn.disabled = true;
      Promise.all(ranges.map(function (rg) {
        return api('/api/me/leave', { method: 'POST', body: JSON.stringify({ dateFrom: rg[0], dateTo: rg[1], leaveType: type, reason: reason }) });
      })).then(function (results) {
        btn.disabled = false;
        var bad = results.filter(function (r) { return !r.ok; });
        if (bad.length) { m.textContent = '  ' + (bad[0].body.error || 'Some requests failed.'); m.className = 'msg err'; }
        else { m.textContent = '  ✓ ' + ranges.length + ' request' + (ranges.length > 1 ? 's' : '') + ' submitted'; m.className = 'msg ok';
          leaveState.sel = {}; document.getElementById('lReason').value = ''; renderCal(); }
        loadLeaveList();
      });
    }
    function loadLeaveList() {
      api('/api/me/leave').then(function (r) {
        var rows = (r.body.requests || []).map(function (x) {
          return '<tr><td>' + esc(x.date_from) + ' → ' + esc(x.date_to) + '</td><td>' + esc(x.leave_type) +
            '</td><td>' + esc(x.reason || '') + '</td><td><span class="badge ' + x.status + '">' + x.status + '</span></td></tr>';
        }).join('');
        document.getElementById('lList').innerHTML = rows
          ? '<table><thead><tr><th>Dates</th><th>Type</th><th>Reason</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>'
          : '<p class="muted">No requests yet.</p>';
      });
    }

    // ---- Loans ----
    var LOAN_TYPES = [['cash_advance','Cash Advance'],['product_advance','Product Advance'],['sss_loan','SSS Loan'],['pagibig_loan','Pag-IBIG Loan']];
    var LOAN_LABEL = {}; LOAN_TYPES.forEach(function (t) { LOAN_LABEL[t[0]] = t[1]; });
    function viewLoans() {
      document.getElementById('view').innerHTML =
        '<div class="card"><h2>Apply for a Loan / Cash Advance</h2><div class="in">' +
        '<div class="grid2">' +
        '<div><label>Type</label><select id="lnType">' + LOAN_TYPES.map(function (t) { return '<option value="' + t[0] + '">' + t[1] + '</option>'; }).join('') + '</select></div>' +
        '<div><label>Amount (₱)</label><input id="lnAmount" type="number" min="0" step="0.01" placeholder="0.00"></div>' +
        '<div><label>Preferred number of pay-period deductions</label><input id="lnInst" type="number" min="1" step="1" value="1"></div>' +
        '</div><label style="margin-top:10px">Reason / notes</label><textarea id="lnReason" rows="2" style="width:100%"></textarea>' +
        '<button class="btn" id="lnSubmit" style="margin-top:12px">Submit Application</button><span id="lnMsg" class="msg"></span>' +
        '</div></div>' +
        '<div class="card"><h2>My Active Loans</h2><div class="in scroll" id="lnActive">Loading…</div></div>' +
        '<div class="card"><h2>My Loan Applications</h2><div class="in scroll" id="lnList">Loading…</div></div>';
      document.getElementById('lnSubmit').addEventListener('click', function () {
        var m = document.getElementById('lnMsg');
        var payload = { loanType: document.getElementById('lnType').value,
          amount: document.getElementById('lnAmount').value,
          installments: document.getElementById('lnInst').value,
          reason: document.getElementById('lnReason').value };
        if (!(Number(payload.amount) > 0)) { m.textContent = '  Enter an amount.'; m.className = 'msg err'; return; }
        api('/api/me/loans', { method: 'POST', body: JSON.stringify(payload) }).then(function (res) {
          m.textContent = res.ok ? '  ✓ Submitted for approval' : ('  ' + (res.body.error || 'Failed'));
          m.className = 'msg ' + (res.ok ? 'ok' : 'err');
          if (res.ok) { document.getElementById('lnAmount').value = ''; document.getElementById('lnReason').value = ''; loadLoans(); }
        });
      });
      loadActiveLoans();
      loadLoans();
    }
    function loadActiveLoans() {
      api('/api/me/profile').then(function (r) {
        var loans = ((r.body || {}).loans || []).filter(function (l) { return l.active !== false; });
        var rows = loans.map(function (l) {
          return '<tr><td>' + esc(l.type || '') + '</td><td class="num">' + peso(l.principal) + '</td><td class="num">' + peso(l.monthlyAmortization) + '</td><td class="num">' + peso(l.balance) + '</td></tr>';
        }).join('');
        document.getElementById('lnActive').innerHTML = rows
          ? '<table><thead><tr><th>Loan</th><th class="num">Principal</th><th class="num">Monthly</th><th class="num">Balance</th></tr></thead><tbody>' + rows + '</tbody></table>'
          : '<p class="muted">No active loans.</p>';
      });
    }
    function loadLoans() {
      api('/api/me/loans').then(function (r) {
        var rows = (r.body.requests || []).map(function (x) {
          return '<tr><td>' + esc(LOAN_LABEL[x.loan_type] || x.loan_type) + '</td><td class="num">' + peso(x.amount) +
            '</td><td class="num">' + esc(x.installments) + '</td><td>' + esc(x.reason || '') +
            '</td><td><span class="badge ' + x.status + '">' + x.status + '</span></td></tr>';
        }).join('');
        document.getElementById('lnList').innerHTML = rows
          ? '<table><thead><tr><th>Type</th><th class="num">Amount</th><th class="num">Cutoffs</th><th>Reason</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>'
          : '<p class="muted">No applications yet.</p>';
      });
    }

    // ---- Overtime authorization ----
    var OT_REASONS = [['production','Production'],['delivery','Delivery'],['collection','Collection']];
    var OT_LABEL = {}; OT_REASONS.forEach(function (t) { OT_LABEL[t[0]] = t[1]; });
    var otTimer = null;
    function viewOvertime() {
      document.getElementById('view').innerHTML =
        '<div class="card"><h2>File Overtime Authorization</h2><div class="in">' +
        '<p class="muted">File for overtime you actually rendered so it can be validated. Hours are computed automatically from your shift schedule and the company overtime policy (including the late rule). Overtime is only paid once approved.</p>' +
        '<div class="grid2">' +
        '<div><label>Overtime type</label><select id="otKind"><option value="after">After shift (worked past shift end)</option><option value="before">Before shift (early time-in)</option></select></div>' +
        '<div><label>Date overtime was rendered</label><input id="otDate" type="date"></div>' +
        '<div><label id="otTimeLabel">End time of overtime</label><input id="otTime" type="time"></div>' +
        '<div><label>Reason for overtime</label><select id="otReason">' + OT_REASONS.map(function (t) { return '<option value="' + t[0] + '">' + t[1] + '</option>'; }).join('') + '</select></div>' +
        '</div>' +
        '<label style="margin-top:10px">Specific reason <span style="color:#e11d2a">*required</span></label>' +
        '<textarea id="otSpecific" rows="2" style="width:100%" placeholder="Describe exactly what the overtime was for"></textarea>' +
        '<div id="otPreview" class="legend" style="margin-top:8px">Enter a date and time to see the computed overtime.</div>' +
        '<button class="btn" id="otSubmit" style="margin-top:8px">Submit for Approval</button><span id="otMsg" class="msg"></span>' +
        '</div></div>' +
        '<div class="card"><h2>My Overtime Requests</h2><div class="in scroll" id="otList">Loading…</div></div>';
      document.getElementById('otKind').addEventListener('change', function () {
        document.getElementById('otTimeLabel').textContent =
          this.value === 'before' ? 'Your early time-in' : 'End time of overtime';
        otPreview();
      });
      document.getElementById('otDate').addEventListener('change', otPreview);
      document.getElementById('otTime').addEventListener('change', otPreview);
      document.getElementById('otSubmit').addEventListener('click', otSubmit);
      loadOvertime();
    }
    function otPreview() {
      var kind = document.getElementById('otKind').value;
      var date = document.getElementById('otDate').value, time = document.getElementById('otTime').value;
      var box = document.getElementById('otPreview');
      if (!date || !time) { box.textContent = 'Enter a date and time to see the computed overtime.'; return; }
      box.textContent = 'Computing…';
      api('/api/me/overtime/preview?kind=' + kind + '&date=' + encodeURIComponent(date) + '&time=' + encodeURIComponent(time)).then(function (r) {
        if (!r.body || !r.body.ok) { box.textContent = (r.body && r.body.error) || 'Could not compute overtime.'; return; }
        var h = (r.body.otHours || 0);
        var where = kind === 'before' ? 'before your ' + esc(r.body.sched) + ' shift start' : 'beyond your ' + esc(r.body.sched) + ' shift end';
        var lateNote = r.body.lateMinutes > 0 ? ' (late by ' + r.body.lateMinutes + ' min that day — first-hour rule applied)' : '';
        box.innerHTML = h > 0
          ? '<b>Computed overtime: ' + h.toFixed(2) + ' hour' + (h === 1 ? '' : 's') + '</b> ' + where + lateNote + '.'
          : 'No creditable overtime for that time' + lateNote + '.';
      });
    }
    function otSubmit() {
      var m = document.getElementById('otMsg');
      var payload = { kind: document.getElementById('otKind').value, date: document.getElementById('otDate').value,
        time: document.getElementById('otTime').value, reason: document.getElementById('otReason').value,
        specificReason: document.getElementById('otSpecific').value };
      if (!payload.date || !payload.time) { m.textContent = '  Enter the date and time.'; m.className = 'msg err'; return; }
      if (!payload.specificReason.trim()) { m.textContent = '  A specific reason is required.'; m.className = 'msg err'; return; }
      api('/api/me/overtime', { method: 'POST', body: JSON.stringify(payload) }).then(function (res) {
        if (!res.ok) { m.textContent = '  ' + (res.body.error || 'Failed'); m.className = 'msg err'; return; }
        m.textContent = '  ✓ Submitted — ' + (res.body.otHours || 0).toFixed(2) + ' hr computed';
        m.className = 'msg ok';
        document.getElementById('otSpecific').value = '';
        loadOvertime();
      });
    }
    function loadOvertime() {
      api('/api/me/overtime').then(function (r) {
        var rows = (r.body.requests || []).map(function (x) {
          var kind = x.ot_kind === 'before' ? 'Pre-shift' : 'After shift';
          return '<tr><td>' + esc(x.ot_date) + '</td><td>' + kind + '</td><td>' + esc(OT_LABEL[x.reason] || x.reason) +
            '</td><td>' + esc(x.specific_reason || '') + '</td><td class="num">' + (x.ot_minutes / 60).toFixed(2) +
            '</td><td><span class="badge ' + x.status + '">' + x.status + '</span></td></tr>';
        }).join('');
        document.getElementById('otList').innerHTML = rows
          ? '<table><thead><tr><th>Date</th><th>Type</th><th>Reason</th><th>Specific</th><th class="num">OT Hrs</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>'
          : '<p class="muted">No overtime requests yet.</p>';
      });
    }

    // ---- My Payslips ----
    function viewPayslips() {
      api('/api/me/payslips').then(function (r) {
        var list = r.body.payslips || [];
        var rows = list.map(function (x, i) {
          return '<tr><td>' + esc(x.period.name) + '</td><td>' + esc(x.period.payDate || '') +
            '</td><td class="num">' + peso(x.result.netPay) + '</td>' +
            '<td><button class="btn sm" data-slip="' + i + '">View</button></td></tr>';
        }).join('');
        document.getElementById('view').innerHTML =
          '<div class="card"><h2>My Payslips</h2><div class="in scroll">' +
          (rows ? '<table><thead><tr><th>Period</th><th>Pay Date</th><th class="num">Net Pay</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>'
            : '<p class="muted">No finalized payslips yet.</p>') +
          '</div></div><div id="slipView"></div>';
        document.querySelectorAll('[data-slip]').forEach(function (b) {
          b.addEventListener('click', function () { showSlip(list[b.dataset.slip]); });
        });
      });
    }
    function payslipDoc(x) {
      var r = x.result, p = x.period, c = state.profile.company || {};
      var earn = (r.earnings || []).map(function (e) { return '<tr><td>' + esc(e.name) + '</td><td class="num">' + peso(e.amount) + '</td></tr>'; }).join('');
      var ded = (r.deductions || []).map(function (d) { return '<tr><td>' + esc(d.name) + '</td><td class="num">' + peso(d.amount) + '</td></tr>'; }).join('') || '<tr><td>None</td><td></td></tr>';
      var css = 'body{font-family:Arial,Helvetica,sans-serif;color:#111;margin:16px}.ps{border:1px solid #333;padding:16px;max-width:640px}' +
        '.h{display:flex;justify-content:space-between;border-bottom:2px solid #333;padding-bottom:6px}.co{font-size:18px;font-weight:bold}' +
        '.t{font-size:15px;font-weight:bold;letter-spacing:1px}.cols{display:flex;gap:18px;margin-top:10px}.cols>div{flex:1}' +
        'table{width:100%;border-collapse:collapse;font-size:12px}td{padding:3px 4px;border-bottom:1px dotted #ccc}.num{text-align:right}' +
        '.net{margin-top:10px;background:#111;color:#fff;padding:8px 12px;display:flex;justify-content:space-between;font-weight:bold;font-size:15px}';
      return '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Payslip ' + esc(p.name) + '</title><style>' + css + '</style></head><body>' +
        '<div class="ps"><div class="h"><div><div class="co">' + esc(c.name || 'Company') + '</div><div style="font-size:11px;color:#555">' + esc(c.address || '') + '</div></div><div class="t">PAYSLIP</div></div>' +
        '<div style="font-size:12px;margin:8px 0"><b>' + esc(state.profile.user.fullName || '') + '</b> &nbsp; Period: ' + esc(p.name) + ' &nbsp; Pay Date: ' + esc(p.payDate || '—') + '</div>' +
        '<div class="cols"><div><h4>Earnings</h4><table>' + earn + '<tr><td><b>Gross</b></td><td class="num"><b>' + peso(r.grossPay) + '</b></td></tr></table></div>' +
        '<div><h4>Deductions</h4><table>' + ded + '<tr><td><b>Total</b></td><td class="num"><b>' + peso(r.totalDeductions) + '</b></td></tr></table></div></div>' +
        '<div class="net"><span>NET PAY</span><span>' + peso(r.netPay) + '</span></div></div></body></html>';
    }
    function printPayslip(x) {
      var html = payslipDoc(x);
      // Native Android print when running inside the app; browser print otherwise.
      if (window.AndroidBridge && window.AndroidBridge.printHtml) {
        window.AndroidBridge.printHtml('Payslip ' + x.period.name, btoa(unescape(encodeURIComponent(html))));
        return;
      }
      var w = window.open('', '_blank');
      if (!w) { window.print(); return; }
      w.document.write(html); w.document.close(); w.focus();
      setTimeout(function () { w.print(); }, 300);
    }
    function showSlip(x) {
      var r = x.result, p = x.period;
      var earn = (r.earnings || []).map(function (e) { return '<tr><td>' + esc(e.name) + '</td><td class="num">' + peso(e.amount) + '</td></tr>'; }).join('');
      var ded = (r.deductions || []).map(function (d) { return '<tr><td>' + esc(d.name) + '</td><td class="num">' + peso(d.amount) + '</td></tr>'; }).join('') || '<tr><td class="muted">None</td><td></td></tr>';
      document.getElementById('slipView').innerHTML =
        '<div class="card"><h2>Payslip — ' + esc(p.name) + '</h2><div class="in">' +
        '<div class="grid2"><div><h3 style="font-size:14px;margin:0 0 6px">Earnings</h3><table>' + earn +
        '<tr><td><b>Gross</b></td><td class="num"><b>' + peso(r.grossPay) + '</b></td></tr></table></div>' +
        '<div><h3 style="font-size:14px;margin:0 0 6px">Deductions</h3><table>' + ded +
        '<tr><td><b>Total</b></td><td class="num"><b>' + peso(r.totalDeductions) + '</b></td></tr></table></div></div>' +
        '<div style="margin-top:12px;background:#0b2447;color:#fff;padding:10px 14px;border-radius:8px;display:flex;justify-content:space-between;font-weight:700"><span>NET PAY</span><span>' + peso(r.netPay) + '</span></div>' +
        '<button class="btn ghost sm" id="slipPrint" style="margin-top:12px">Print / Save PDF</button>' +
        '</div></div>';
      document.getElementById('slipPrint').addEventListener('click', function () { printPayslip(x); });
      document.getElementById('slipView').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
