<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDS Trading Payroll Solutions — Reset Password</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%2317408b'/><rect x='17' y='47' width='30' height='5' rx='2.5' fill='%23e11d2a'/><text x='32' y='42' font-family='Arial' font-size='36' font-weight='bold' fill='%23fff' text-anchor='middle'>₱</text></svg>">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #17408b, #0b2447); min-height: 100vh; display: grid; place-items: center; padding: 20px; color: #1e293b; }
    .card { background: #fff; width: 100%; max-width: 400px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.25); padding: 26px 24px; }
    h1 { font-size: 19px; text-align: center; margin: 0 0 16px; }
    label { font-size: 12px; font-weight: 600; color: #64748b; display: block; margin: 12px 0 5px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 9px; font-size: 15px; }
    .btn { width: 100%; margin-top: 16px; padding: 12px; border: none; border-radius: 9px; background: #17408b; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    .msg { margin-top: 12px; font-size: 13px; padding: 10px 12px; border-radius: 8px; display: none; }
    .msg.err { display: block; background: #fef2f2; color: #b91c1c; }
    .msg.ok { display: block; background: #f0fdf4; color: #15803d; }
    a { color: #17408b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set a New Password</h1>
    <div id="msg" class="msg"></div>
    <form id="f">
      <label>New Password</label>
      <input id="pw" type="password" minlength="6" required>
      <label>Confirm Password</label>
      <input id="pw2" type="password" minlength="6" required>
      <button class="btn" type="submit">Update Password</button>
    </form>
    <p style="text-align:center;margin-top:14px;font-size:13px"><a href="/">Back to sign in</a></p>
  </div>
  <script>
    var token = new URLSearchParams(location.search).get('token') || '';
    var msg = document.getElementById('msg');
    function show(t, ok) { msg.textContent = t; msg.className = 'msg ' + (ok ? 'ok' : 'err'); }
    if (!token) show('This reset link is missing its token. Request a new link from the sign-in page.');
    document.getElementById('f').addEventListener('submit', function (e) {
      e.preventDefault();
      var pw = document.getElementById('pw').value, pw2 = document.getElementById('pw2').value;
      if (pw !== pw2) return show('Passwords do not match.');
      fetch('/api/auth/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: token, password: pw }) })
        .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
        .then(function (res) {
          if (!res.ok) return show(res.j.error || 'Could not reset password.');
          show('Password updated. You can now sign in.', true);
          setTimeout(function () { location.href = '/'; }, 1600);
        }).catch(function () { show('Network error.'); });
    });
  </script>
</body>
</html>
